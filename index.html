<select id="destino">
    <option value="">Selecione uma opção...</option>
    <option value="Vargem Alegre - R$ 10,00">Vargem Alegre - R$ 10,00</option>
    <option value="Dorandia - R$ 20,00">Dorandia - R$ 20,00</option>
    <option value="Pinheiral - R$ 40,00">Pinheiral - R$ 40,00</option>
    <option value="Barra do Piraí - R$ 50,00">Barra do Piraí - R$ 50,00</option>
</select>

<button onclick="enviarParaWhatsApp()">Confirmar Corrida</button>

<script>
    function enviarParaWhatsApp() {
        const select = document.getElementById('destino');
        const destinoSelecionado = select.value;

        if (destinoSelecionado === "") {
            alert("Por favor, selecione um destino!");
            return;
        }

        // --- CONFIGURAÇÃO ---
        const seuNumeroWhatsApp = "5524999999999"; // Coloque o seu número com DDD aqui
        const mensagem = "Olá! Gostaria de solicitar uma corrida para: " + destinoSelecionado;
        // --------------------

        // Cria a URL com a mensagem codificada
        const url = `https://wa.me/${seuNumeroWhatsApp}?text=${encodeURIComponent(mensagem)}`;

        // Abre o WhatsApp
        window.open(url, '_blank');
    }
</script>
